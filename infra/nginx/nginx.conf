# Nginx reverse proxy for RC7 Programming Assistant
#
# All browser traffic enters through Nginx on 80/443.
# Next.js (web:3000) handles /api/v1/* internally via its catch-all proxy
# route, so Nginx only needs to forward everything to the web service.
#
# SSL certificates are expected at:
#   /etc/nginx/ssl/fullchain.pem
#   /etc/nginx/ssl/privkey.pem
#
# To obtain a Let's Encrypt certificate (run once before starting the stack):
#   certbot certonly --standalone -d tudominio.com
#   cp /etc/letsencrypt/live/tudominio.com/fullchain.pem infra/nginx/ssl/
#   cp /etc/letsencrypt/live/tudominio.com/privkey.pem   infra/nginx/ssl/

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/font-woff2;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Extended timeouts for long-running Gemini RAG requests (~30-60 s)
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;

        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support (Next.js HMR is disabled in prod, but kept for future use)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
