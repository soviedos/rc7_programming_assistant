[project]
name = "rc7-shared-config"
version = "0.1.0"
description = "Settings base y validación de secretos compartidos por apps/api y apps/worker"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.0.0,<3.0.0",
  "pydantic-settings>=2.0.0,<3.0.0",
]

[build-system]
requires = ["setuptools>=80.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["rc7_shared_config*"]
