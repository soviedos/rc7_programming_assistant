name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend tests (no Docker needed — pure unit tests with jsdom) ──────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─── Backend & worker tests (require PostgreSQL, Redis, MinIO) ───────────────
  test-backend:
    name: Backend & worker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for test stack
        run: cp .env.example .env

      - name: Start infrastructure services
        run: docker compose up -d postgres redis minio

      - name: Wait for infrastructure to be healthy
        run: |
          timeout 90 bash -c \
            'until docker compose ps | grep -E "(postgres|redis|minio).*healthy" | wc -l | grep -q "^3$"; do
               echo "Waiting for infra..."; sleep 3
             done'

      - name: Run backend tests
        run: docker compose run --rm api python -m pytest

      - name: Run worker tests
        run: docker compose run --rm worker python -m pytest

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─── Deploy (only on push to main, after all tests pass) ─────────────────────
  deploy:
    name: Deploy to production
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # SERVER_WORKDIR: absolute path to the project on the server.
          # The .env file must already exist on the server with chmod 600.
          # It is NEVER written or overwritten by this workflow; manage it
          # manually (scp / ansible / first-time setup) to avoid fragile
          # multiline-secret expansion and to preserve intentional overrides.
          script: |
            set -e
            cd "${{ secrets.SERVER_WORKDIR }}"

            # Abort early if production env is missing — do not start a broken stack
            if [[ ! -f .env ]]; then
              echo "ERROR: .env not found at ${{ secrets.SERVER_WORKDIR }}/.env" >&2
              echo "Set it up once with: scp .env.prod.example user@host:$(pwd)/.env && chmod 600 .env" >&2
              exit 1
            fi

            git pull origin main

            # Build and start; --wait blocks until all healthchecks pass
            docker compose -f docker-compose.prod.yml up -d --build --wait --wait-timeout 120

            # Rollback if any service is unhealthy after the timeout
            if ! docker compose -f docker-compose.prod.yml ps --filter "status=running" | grep -q "running"; then
              echo "ERROR: one or more services failed to start. Rolling back..." >&2
              docker compose -f docker-compose.prod.yml down
              exit 1
            fi

            echo "Deploy complete"
